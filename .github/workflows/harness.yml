name: harness

on:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Harness tag to run
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - regression
          - edge
          - adversarial

jobs:
  harness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
      - name: Install harness dependencies
        run: pnpm -C harness install --frozen-lockfile
      - name: Bootstrap docs toolchain
        run: pnpm -C harness bootstrap
      - name: Validate harness
        run: pnpm -C harness validate
      - name: Select harness tag
        id: select-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=smoke" >> "$GITHUB_OUTPUT"
          fi
      - name: Run harness
        run: pnpm -C harness run -- --tag "${{ steps.select-tag.outputs.value }}"
      - name: Upload harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ steps.select-tag.outputs.value }}-ubuntu-latest
          path: |
            harness/reports
            harness/traces
